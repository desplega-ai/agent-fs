default_install_hook_types = ["pre-push"]
default_stages = ["pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "typecheck"
name = "typecheck"
language = "system"
entry = "bun run typecheck"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "typecheck-live"
name = "typecheck (live)"
language = "system"
entry = "bash -c 'cd live && npx tsc --noEmit'"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "build"
name = "build"
language = "system"
entry = "bun run build"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "test-coverage"
name = "test:coverage"
language = "system"
entry = "bun run test:coverage"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "openapi-freshness"
name = "OpenAPI spec freshness"
language = "system"
entry = "bash -c 'bun run scripts/sync-openapi.ts && git diff --exit-code docs/openapi.json'"
pass_filenames = false
always_run = true
