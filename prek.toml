default_install_hook_types = ["pre-push"]
default_stages = ["pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "typecheck"
name = "typecheck"
language = "system"
entry = "bun run typecheck"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "build"
name = "build"
language = "system"
entry = "bun run build"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "test-coverage"
name = "test:coverage"
language = "system"
entry = "bun run test:coverage"
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "e2e"
name = "E2E tests"
language = "system"
entry = "bun run scripts/e2e.ts \"bun run packages/cli/src/index.ts --\""
pass_filenames = false
always_run = true

[[repos.hooks]]
id = "openapi-freshness"
name = "OpenAPI spec freshness"
language = "system"
entry = "bash -c 'bun run scripts/sync-openapi.ts && git diff --exit-code docs/openapi.json'"
pass_filenames = false
always_run = true
