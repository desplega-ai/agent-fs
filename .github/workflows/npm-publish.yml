name: Release & Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to publish (e.g. v0.5.3)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          if [ "$PKG_VERSION" != "$RELEASE_TAG" ]; then
            echo "::error::Tag $RELEASE_TAG doesn't match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: cp README.md packages/cli/README.md
      - run: cd packages/cli && bun pm pack

      - name: Publish to npm
        run: npm publish packages/cli/*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          VERSION="$RELEASE_TAG"
          gh release create "$VERSION" --generate-notes --notes "$(cat <<'NOTES'

          ## Install

          ```bash
          # bun
          bun add -g @desplega.ai/agent-fs@${VERSION#v}

          # npm
          npm install -g @desplega.ai/agent-fs@${VERSION#v}

          # pnpm
          pnpm add -g @desplega.ai/agent-fs@${VERSION#v}
          ```

          ## Update

          ```bash
          bun update -g @desplega.ai/agent-fs
          ```
          NOTES
          )"
        env:
          GH_TOKEN: ${{ github.token }}
