name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: agent-fs-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: agent-fs-linux-arm64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: agent-fs-darwin-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Install Homebrew SQLite (macOS)
        if: startsWith(matrix.target, 'bun-darwin')
        run: brew install sqlite

      - name: Install cross-platform sqlite-vec (Linux ARM64)
        if: matrix.target == 'bun-linux-arm64'
        run: bun add sqlite-vec-linux-arm64

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} doesn't match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build binary with native extensions
        run: ./scripts/build.sh --target ${{ matrix.target }} --outfile dist/agent-fs

      - name: Package as tarball
        shell: bash
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz *
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: cd packages/cli && bun run build:npm
      - run: cd packages/cli && bun pm pack
      - run: npm publish packages/cli/*.tgz --access public --provenance
