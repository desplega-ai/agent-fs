name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: agentfs-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: agentfs-linux-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: agentfs-darwin-x64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: agentfs-darwin-arm64
          - target: bun-windows-x64
            os: windows-latest
            artifact: agentfs-windows-x64.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "::error::Tag ${{ github.ref_name }} doesn't match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build binary
        run: bun build --compile --minify --target=${{ matrix.target }} packages/cli/src/index.ts --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
