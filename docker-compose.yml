services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  agent-fs:
    build: .
    ports:
      - "7433:7433"
    depends_on:
      - minio
    environment:
      AGENT_FS_HOME: /data
    volumes:
      - agent-fs-data:/data

volumes:
  minio-data:
  agent-fs-data:
