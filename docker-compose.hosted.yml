# Hosted deployment — uses external S3 instead of MinIO.
# Configure S3 via environment variables or mount a config.json.
#
# Usage:
#   docker compose -f docker-compose.hosted.yml up -d
#
services:
  agent-fs:
    build: .
    ports:
      - "7433:7433"
    environment:
      AGENT_FS_HOME: /data
      # Set these or mount a config.json with S3 settings
      # S3_ENDPOINT: https://<account>.r2.cloudflarestorage.com
      # S3_BUCKET: agent-fs
      # S3_ACCESS_KEY_ID: ...
      # S3_SECRET_ACCESS_KEY: ...
      # S3_REGION: auto
    volumes:
      - agent-fs-data:/data

volumes:
  agent-fs-data:
